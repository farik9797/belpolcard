name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Разрешения нужны только деплою: читать репозиторий, писать в Pages,
# получать OIDC-токен для actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Параллельные пуши не должны отменять уже идущий деплой.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      # Сайт статический: заливаем корень репозитория как есть
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
